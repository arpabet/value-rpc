name: Value-RPC CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Keep go.arpabet.com modules off Google's public module proxy/checksum DB:
# GOPRIVATE expands to GONOPROXY + GONOSUMDB, so these modules are fetched
# directly from source and not cached by proxy.golang.org / sum.golang.org.
env:
  GOPRIVATE: go.arpabet.com/*

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ '1.25.x', '1.26.x' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -cover ./...

  # The QUIC transport is a separate module (go.arpabet.com/value-rpc/quic) so
  # quic-go stays out of the core; it gets its own job.
  quic:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ '1.25.x', '1.26.x' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        working-directory: quic
        run: go build ./...

      - name: Vet
        working-directory: quic
        run: go vet ./...

      - name: Test
        working-directory: quic
        run: go test -race -cover ./...

  # Service-governance policies (retry, circuit breaker, …) are a separate module
  # (go.arpabet.com/value-rpc/resilience) so they impose no deps on plain clients.
  resilience:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ '1.25.x', '1.26.x' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        working-directory: resilience
        run: go build ./...

      - name: Vet
        working-directory: resilience
        run: go vet ./...

      - name: Test
        working-directory: resilience
        run: go test -race -cover ./...

  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      # Smoke-run every benchmark a few iterations so they keep compiling and
      # running; this is a correctness gate, not a measurement.
      - name: Benchmarks
        run: go test -run='^$' -bench=. -benchmem -benchtime=20x ./...

      - name: Benchmarks (quic submodule)
        working-directory: quic
        run: go test -run='^$' -bench=. -benchmem -benchtime=20x ./...

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: govulncheck (quic submodule)
        working-directory: quic
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: govulncheck (resilience submodule)
        working-directory: resilience
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  # gofmt gate: the whole tree (both modules — gofmt is file-based) must be
  # formatted. Fails listing any offending files.
  gofmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean (run 'gofmt -w .'):"
            echo "$unformatted"
            exit 1
          fi

  # Fuzz smoke: run each codec fuzz target briefly so the decode path keeps
  # surviving adversarial input. This is a robustness gate, not a long campaign.
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Fuzz ReadMessage (smoke)
        run: go test ./valuerpc/ -run='^$' -fuzz='^FuzzReadMessage$' -fuzztime=30s

      - name: Fuzz Unpack (smoke)
        run: go test ./valuerpc/ -run='^$' -fuzz='^FuzzUnpack$' -fuzztime=30s
